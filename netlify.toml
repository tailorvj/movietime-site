# Netlify — Gett Movie Time

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  function = "geo-gate"
  path = "/he"

[[edge_functions]]
  function = "geo-gate"
  path = "/ru"

[[edge_functions]]
  function = "geo-gate"
  path = "/he/unavailable"

[[edge_functions]]
  function = "geo-gate"
  path = "/ru/unavailable"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.vimeocdn.com; font-src 'self' data:; connect-src 'self'; frame-src https://player.vimeo.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
